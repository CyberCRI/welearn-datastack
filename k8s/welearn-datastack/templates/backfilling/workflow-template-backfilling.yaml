{{- with .Values.backfilling }}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: {{ .name }}-backfilling
spec:
  entrypoint: all
  serviceAccountName: {{ $.Values.common.workflowRbac.serviceAccountName }}
  securityContext:
    {{- include "common.security.podSecurityContext.restricted" dict | nindent 4 }}
  templates:
    - name: generate-to-collect-backfilling
      podSpecPatch: >-
        {{ print "{\"containers\":[{\"name\":\"main\", \"resources\":{\"limits\": {\"memory\": \"{{inputs.parameters.memory}}\"}, \"requests\": {\"memory\": \"{{inputs.parameters.memory}}\"}}}]}" }}
      inputs:
        parameters:
          - name: parallelism_treshold
            default: 100000
          - name: parallelism_max
            default: 15
          - name: batch_urls_directory
            default: batch_urls
          - name: memory
            default: {{ .workflowTemplates.prepareBatches.requests.memory }}
          - name: batch_urls_count_file_name
            default: "quantity.txt"
          - name: output_filename
            default: "batch_ids.csv"
          - name: log_level
            default: "INFO"
          - name: query_name
          - name: revision_id
          - name: batch_size
            default: 10
      outputs:
        artifacts:
          - name: batch_ids_csv
            path: >-
              {{ printf "%s/%s/{{inputs.parameters.batch_urls_directory}}" $.Values.common.artifactRoot $.Values.common.artifactOutputFolder }}
        parameters:
          - name: url_batches_count
            valueFrom:
              path: >-
                {{ printf "%s/%s/{{inputs.parameters.batch_urls_directory}}/{{inputs.parameters.batch_urls_count_file_name}}" $.Values.common.artifactRoot $.Values.common.artifactOutputFolder }}
      container:
      {{- with $.Values.image }}
        image: {{ tpl (printf "%s/%s:%s" .repository .path .tag) $ }}
      {{- end }}
        envFrom:
          - configMapRef:
              name: {{ .name }}
        env:
          - name: ARTIFACT_ROOT
            value: {{ $.Values.common.artifactRoot }}
          - name: IS_LOCAL
            value: "0"
          - name: PARALLELISM_THRESHOLD
            value: >-
              {{ print "{{inputs.parameters.parallelism_treshold}}" }}
          - name: PARALLELISM_URL_MAX
            value: >-
               {{ print "{{inputs.parameters.parallelism_max}}" }}
          - name: BATCH_URLS_DIRECTORY
            value: >-
               {{ print "{{inputs.parameters.batch_urls_directory}}" }}
          - name: PICK_QTY_MAX
            value: >-
               {{ print "{{inputs.parameters.pick_qty_max }}" }}
          - name: LOG_LEVEL
            value: >-
              {{ print "{{inputs.parameters.log_level}}" }}
          - name: OUTPUT_FILE_NAME
            value: >-
              {{ print "{{inputs.parameters.output_filename}}" }}
          - name: QUERY_NAME
            value: >-
              {{ print "{{inputs.parameters.query_name}}" }}
          - name: REVISION_ID
            value: >-
              {{ print "{{inputs.parameters.revision_id}}" }}
          - name: BATCH_SIZE
            value: >-
              {{ print "{{inputs.parameters.batch_size}}" }}
        args:
          - python
          - "-m"
          - welearn_datastack.nodes_workflow.BackFiller.generate_to_backfill_batch

        volumeMounts:
        - name: secrets
          mountPath: "/secrets"
          readOnly: true
        - name: azure-share
          mountPath: {{ .pluginsFolderRoot }}

      volumes:
      - name: secrets
        secret:
          secretName: {{ .name }}
      - name: azure-share
        csi:
          driver: file.csi.azure.com
          readOnly: true
          volumeAttributes:
            secretName: {{ $.Values.common.azureShare.secret.name }}
            shareName: {{ $.Values.common.azureShare.name }}

    - name: run-backfilling
      podSpecPatch: >-
        {{ print "{\"containers\":[{\"name\":\"main\", \"resources\":{\"requests\": {\"memory\": \"{{inputs.parameters.memory}}\"},\"limits\": {\"memory\": \"{{inputs.parameters.memory}}\"}}}]}" }}
      inputs:
        parameters:
          - name: log_level
            default: "INFO"
          - name: urls_input_filename
          - name: urls_directory
            default: urls
          - name: memory
            default: {{ .workflowTemplates.runNode.requests.memory }}
          - name: query_name
          - name: revision_id
        artifacts:
          - name: batch_ids_csv
            path: >-
              {{ printf "%s/%s/{{inputs.parameters.urls_directory}}" $.Values.common.artifactRoot $.Values.common.artifactInputFolder }}
      container:
      {{- with $.Values.image }}
        image: {{ tpl (printf "%s/%s:%s" .repository .path .tag) $ }}
      {{- end }}
        envFrom:
          - configMapRef:
              name: {{ .name }}
        env:
          - name: ARTIFACT_ROOT
            value: {{ $.Values.common.artifactRoot }}
          - name: IS_LOCAL
            value: "0"
          - name: LOG_LEVEL
            value: >-
              {{ print "{{inputs.parameters.log_level}}" }}
          - name: ARTIFACT_ID_URL_CSV_NAME
            value: >-
              {{ print "{{inputs.parameters.urls_directory}}/{{inputs.parameters.urls_input_filename}}" }}
          - name: QUERY_NAME
            value: >-
              {{ print "{{inputs.parameters.query_name}}" }}
          - name: REVISION_ID
            value: >-
              {{ print "{{inputs.parameters.revision_id}}" }}
        args:
          - python
          - "-m"
          - welearn_datastack.nodes_workflow.BackFiller.backfilling
        volumeMounts:
        - name: secrets
          mountPath: "/secrets"
          readOnly: true
        - name: azure-share
          mountPath: {{ .pluginsFolderRoot }}
      volumes:
      - name: secrets
        secret:
          secretName: {{ .name }}
      - name: azure-share
        csi:
          driver: file.csi.azure.com
          readOnly: true
          volumeAttributes:
            secretName: {{ $.Values.common.azureShare.secret.name }}
            shareName: {{ $.Values.common.azureShare.name }}
    - name: all
      inputs:
        parameters:
          - name: log_level
            default: "INFO"
          - name: parallelism_treshold
            default: 100000
          - name: parallelism_max
            default: 15
          - name: batch_urls_directory
            default: batch_urls
          - name: memory
            default: {{ .workflowTemplates.prepareBatches.requests.memory }}
          - name: batch_urls_count_file_name
            default: "quantity.txt"
          - name: batch_urls_ids_file_name
            default: "batch_ids.csv"
          - name: query_name_batch_generator
          - name: query_name_run_backfilling
          - name: revision_id
          - name: batch_size
            default: 10
      steps:
      - - name: generate-to-collect-backfilling
          templateRef:
            name: {{ .name }}-backfilling
            template: generate-to-collect-backfilling
          arguments:
            parameters:
              - name: log_level
                value: >-
                  {{ print "{{inputs.parameters.log_level}}" }}
              - name: parallelism_treshold
                value: >-
                  {{ print "{{inputs.parameters.parallelism_treshold}}" }}
              - name: parallelism_max
                value: >-
                  {{ print "{{inputs.parameters.parallelism_max}}" }}
              - name: batch_urls_directory
                value: >-
                  {{ print "{{inputs.parameters.batch_urls_directory}}" }}
              - name: memory
                value: >-
                  {{ print "{{inputs.parameters.memory}}" }}
              - name: batch_urls_count_file_name
                value: >-
                  {{ print "{{inputs.parameters.batch_urls_count_file_name}}" }}
              - name: output_filename
                value: >-
                  {{ print "{{inputs.parameters.batch_urls_ids_file_name}}" }}
              - name: query_name
                value: >-
                  {{ print "{{inputs.parameters.query_name_batch_generator}}" }}
              - name: revision_id
                value: >-
                  {{ print "{{inputs.parameters.revision_id}}" }}
              - name: batch_size
                value: >-
                  {{ print "{{inputs.parameters.batch_size}}" }}
        - - name: run-backfilling
            templateRef:
              name: {{ .name }}-backfilling
              template: run-backfilling
            arguments:
              parameters:
                - name: log_level
                  value: >-
                    {{ print "{{inputs.parameters.log_level}}" }}
                - name: urls_input_filename
                  value: >-
                    {{ print "{{inputs.parameters.batch_urls_ids_file_name}}" }}
                - name: urls_directory
                  value: >-
                    {{ print "{{inputs.parameters.batch_urls_directory}}" }}
                - name: memory
                  value: >-
                    {{ print "{{inputs.parameters.memory}}" }}
                - name: query_name
                  value: >-
                    {{ print "{{inputs.parameters.query_name_run_backfilling}}" }}
                - name: revision_id
                  value: >-
                    {{ print "{{inputs.parameters.revision_id}}" }}
{{- end }}